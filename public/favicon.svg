<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
<defs>
<linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
<stop offset="0%" stop-color="#071B35"/>
<stop offset="100%" stop-color="#020814"/>
</linearGradient>

<linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
<stop offset="0%" stop-color="#2FFFD2"/>
<stop offset="100%" stop-color="#1A7BFF"/>
</linearGradient>
</defs>

<!-- background -->
<rect x="64" y="64" width="896" height="896" rx="180" fill="url(#bg)"/>

<!-- pin -->
<path d="M512 180C360 180 250 290 250 430C250 580 380 720 512 860C644 720 774 580 774 430C774 290 664 180 512 180Z"
fill="none" stroke="url(#accent)" stroke-width="40"/>

<!-- buildings -->
<rect x="420" y="360" width="60" height="220" fill="#7DD3FC"/>
<rect x="490" y="300" width="80" height="280" fill="#2563EB"/>
<rect x="580" y="380" width="60" height="200" fill="#38BDF8"/>

<!-- roof -->
<polygon points="350,580 512,450 674,580" fill="#E5E7EB"/>

<!-- house body -->
<rect x="380" y="580" width="264" height="160" fill="#020814"/>

<!-- windows -->
<rect x="470" y="630" width="30" height="30" fill="#FACC15"/>
<rect x="520" y="630" width="30" height="30" fill="#FACC15"/>
<rect x="470" y="680" width="30" height="30" fill="#FACC15"/>
<rect x="520" y="680" width="30" height="30" fill="#FACC15"/>

<!-- sparkles (fixed positions) -->
<circle cx="720" cy="300" r="10" fill="#67E8F9"/>
<circle cx="760" cy="350" r="6" fill="#FFFFFF"/>

</svg>
